apiVersion: apps/v1
kind: Deployment
metadata:
  name: shieldx-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shieldx-backend
  template:
    metadata:
      labels:
        app: shieldx-backend
    spec:
      containers:
        - name: backend
          image: your-registry/shieldx-backend:latest
          ports:
            - containerPort: 9999
          env:
            - name: DB_URL
              value: jdbc:mysql://shieldx-mysql:3306/sheidx?createDatabaseIfNotExist=true
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: shieldx-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shieldx-secrets
                  key: db-password
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: shieldx-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: shieldx-secrets
                  key: jwt-refresh-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9999
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shieldx-backend
spec:
  selector:
    app: shieldx-backend
  ports:
    - name: http
      port: 9999
      targetPort: 9999
