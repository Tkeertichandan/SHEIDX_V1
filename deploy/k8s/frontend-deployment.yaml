apiVersion: apps/v1
kind: Deployment
metadata:
  name: shieldx-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shieldx-frontend
  template:
    metadata:
      labels:
        app: shieldx-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/shieldx-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: shieldx-frontend
spec:
  selector:
    app: shieldx-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
