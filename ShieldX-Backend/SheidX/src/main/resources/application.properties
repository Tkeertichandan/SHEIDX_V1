spring.application.name=SheidX
server.port=9999

#connection properties

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sheidx?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2300033901}

#real-time processing settings
shieldx.claims.auto-process-ms=10000
shieldx.triggers.auto-generate-ms=45000

#hibernate properties

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

#security
shieldx.security.jwt.access-secret=${JWT_ACCESS_SECRET:shieldx-access-secret-key-must-be-very-long-2026}
shieldx.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:shieldx-refresh-secret-key-must-be-very-long-2026}
shieldx.security.jwt.access-token-seconds=900
shieldx.security.jwt.refresh-token-seconds=1209600
shieldx.security.bootstrap.admin-username=${ADMIN_USERNAME:admin}
shieldx.security.bootstrap.admin-email=${ADMIN_EMAIL:admin@shieldx.local}
shieldx.security.bootstrap.admin-password=${ADMIN_PASSWORD:Admin@12345}

#observability and API docs
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#AI model integration
shieldx.ai.mode=${AI_MODE:hybrid}
shieldx.ai.provider=${AI_PROVIDER:openai}
shieldx.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
shieldx.ai.openai.api-key=${OPENAI_API_KEY:}
shieldx.ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
shieldx.ai.huggingface.base-url=${HF_BASE_URL:https://api-inference.huggingface.co/models}
shieldx.ai.huggingface.api-key=${HF_API_KEY:}
shieldx.ai.huggingface.model=${HF_MODEL:mistralai/Mistral-7B-Instruct-v0.2}
shieldx.ai.generation.temperature=${AI_TEMPERATURE:0.2}
shieldx.ai.generation.max-output-tokens=${AI_MAX_OUTPUT_TOKENS:400}